# Stack completo TheHunter.tech (despliegue). El desarrollo NO usa Docker:
# backend con nodemon y frontend con vite en local. Ver docs/DECISIONES.md.
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: thehuntertech
      MYSQL_USER: app
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # Sin ports: MySQL solo accesible dentro de la red del stack.
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    # Inyecta TODO el .env de la raiz al contenedor (ADMIN_*, DB_SYNC, etc.).
    # `environment` de abajo tiene prioridad para lo especifico del stack (DB_HOST...).
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: thehuntertech
      DB_USER: app
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      # Al arrancar: sincroniza esquema (alter) y siembra catalogos + admin inicial.
      DB_SYNC: ${DB_SYNC:-alter}
      ADMIN_NOMBRE: ${ADMIN_NOMBRE:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    # Sin ports: backend solo accesible dentro de la red del stack.
    # nginx del contenedor frontend enruta /api hacia aqui.
    expose:
      - "4000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    # Unico punto de entrada externo. nginx sirve el SPA y proxya /api al backend.
    # Puerto del host configurable en .env (FRONTEND_PORT). Def. 80 (produccion).
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
